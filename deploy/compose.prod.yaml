services:
  api:
    image: ${IMAGE:?IMAGE debe contener la imagen publicada}
    restart: unless-stopped
    environment:
      APP_ENV: production
      APP_VERSION: ${APP_VERSION:?APP_VERSION debe identificar el commit}
    ports:
      - "127.0.0.1:${APP_PORT:-8000}:8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2)",
        ]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

