apiVersion: apps/v1
kind: Deployment
metadata:
  name: formatec-api
  namespace: __NAMESPACE__
  labels:
    app: formatec-api
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: formatec-api
  template:
    metadata:
      labels:
        app: formatec-api
    spec:
      imagePullSecrets:
        - name: ghcr-pull
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: api
          image: __IMAGE__
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: APP_ENV
              value: __ENVIRONMENT__
            - name: APP_VERSION
              value: __VERSION__
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 2
            periodSeconds: 3
            timeoutSeconds: 2
            failureThreshold: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
---
apiVersion: v1
kind: Service
metadata:
  name: formatec-api
  namespace: __NAMESPACE__
  labels:
    app: formatec-api
spec:
  type: ClusterIP
  selector:
    app: formatec-api
  ports:
    - name: http
      port: 80
      targetPort: http

