services:
  api:
    build:
      context: .
    environment:
      APP_ENV: ${APP_ENV:-local}
      APP_VERSION: ${APP_VERSION:-development}
    ports:
      - "${APP_PORT:-8000}:8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2)",
        ]
      interval: 3s
      timeout: 2s
      retries: 10
      start_period: 5s

