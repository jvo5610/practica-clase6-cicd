name: CI/CD

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    name: 1 · Análisis estático y unit tests
    runs-on: ubuntu-latest

    steps:
      - name: Descargar el código
        uses: actions/checkout@v6

      - name: Preparar Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Instalar dependencias
        run: pip install --requirement requirements-dev.txt

      - name: Analizar calidad con Ruff
        run: |
          ruff check .
          ruff format --check .

      - name: Analizar seguridad con Bandit
        run: bandit --recursive app

      - name: Ejecutar unit tests
        run: pytest tests/unit

  build_image:
    name: 2 · Construir imagen
    needs: quality
    runs-on: ubuntu-latest

    steps:
      - name: Descargar el código
        uses: actions/checkout@v6

      - name: Construir la imagen del commit
        run: docker build --tag formatec-api:${{ github.sha }} .

  deploy_dev:
    name: 3 · Dev efímero y regresión
    if: github.event_name == 'pull_request' && github.event.pull_request.draft == false
    needs: build_image
    runs-on: ubuntu-latest

    environment:
      name: development

    concurrency:
      group: dev-pr-${{ github.event.pull_request.number }}
      cancel-in-progress: true

    steps:
      - name: Descargar el código
        uses: actions/checkout@v6

      - name: Preparar Python para las pruebas externas
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Instalar el cliente de pruebas
        run: pip install pytest==9.1.1 requests==2.34.2

      - name: Desplegar el entorno dev
        env:
          APP_ENV: development
          APP_VERSION: pr-${{ github.event.pull_request.number }}-${{ github.sha }}
        run: docker compose up --detach --build --wait

      - name: Ejecutar tests de regresión contra dev
        env:
          BASE_URL: http://localhost:8000
        run: pytest --verbose --strict-markers -m regression tests/regression

      - name: Mostrar logs si algo falló
        if: failure()
        run: docker compose logs --no-color

      - name: Destruir el entorno efímero
        if: always()
        run: docker compose down --volumes --remove-orphans

  ready:
    name: Listo para merge
    if: github.event_name == 'pull_request' && always()
    needs: [quality, build_image, deploy_dev]
    runs-on: ubuntu-latest

    steps:
      - name: Verificar todos los controles
        env:
          QUALITY_RESULT: ${{ needs.quality.result }}
          BUILD_RESULT: ${{ needs.build_image.result }}
          DEV_RESULT: ${{ needs.deploy_dev.result }}
        run: |
          {
            echo "## Resultado del candidato"
            echo ""
            echo "| Control | Resultado |"
            echo "| --- | --- |"
            echo "| Análisis y unit tests | $QUALITY_RESULT |"
            echo "| Imagen Docker | $BUILD_RESULT |"
            echo "| Dev y regresión | $DEV_RESULT |"
          } >> "$GITHUB_STEP_SUMMARY"

          test "$QUALITY_RESULT" = "success"
          test "$BUILD_RESULT" = "success"
          test "$DEV_RESULT" = "success"

          echo "El cambio está listo para revisión y merge."

  publish:
    name: 4 · Publicar imagen
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    needs: build_image
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    outputs:
      image_uri: ${{ steps.image.outputs.image_uri }}

    steps:
      - name: Descargar el código
        uses: actions/checkout@v6

      - name: Calcular el nombre de imagen
        id: image
        shell: bash
        run: |
          image_name="ghcr.io/${GITHUB_REPOSITORY,,}"
          echo "image_name=$image_name" >> "$GITHUB_OUTPUT"
          echo "image_uri=$image_name:sha-$GITHUB_SHA" >> "$GITHUB_OUTPUT"

      - name: Iniciar sesión en GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Preparar etiquetas
        id: metadata
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.image_name }}
          tags: |
            type=raw,value=sha-${{ github.sha }}
            type=raw,value=latest

      - name: Construir y publicar
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}

  production:
    name: 5 · Desplegar producción
    if: >-
      github.event_name != 'pull_request' &&
      github.ref == 'refs/heads/main' &&
      vars.PROD_DEPLOY_ENABLED == 'true'
    needs: publish
    runs-on: ubuntu-latest

    environment:
      name: production
      url: ${{ vars.PROD_URL }}

    concurrency:
      group: production
      cancel-in-progress: false

    steps:
      - name: Descargar el código
        uses: actions/checkout@v6

      - name: Configurar acceso SSH
        env:
          PROD_SSH_KEY: ${{ secrets.PROD_SSH_KEY }}
          PROD_KNOWN_HOSTS: ${{ secrets.PROD_KNOWN_HOSTS }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$PROD_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf '%s\n' "$PROD_KNOWN_HOSTS" > ~/.ssh/known_hosts

      - name: Copiar la definición de producción
        env:
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_PATH: ${{ vars.PROD_PATH }}
          PROD_USER: ${{ secrets.PROD_USER }}
        run: |
          # shellcheck disable=SC2029
          ssh "$PROD_USER@$PROD_HOST" "mkdir -p '$PROD_PATH'"
          scp deploy/compose.prod.yaml \
            "$PROD_USER@$PROD_HOST:$PROD_PATH/compose.yaml"

      - name: Actualizar la aplicación
        env:
          APP_VERSION: ${{ github.sha }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          IMAGE_URI: ${{ needs.publish.outputs.image_uri }}
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_PATH: ${{ vars.PROD_PATH }}
          PROD_USER: ${{ secrets.PROD_USER }}
        run: |
          # shellcheck disable=SC2029
          printf '%s' "$GHCR_TOKEN" | ssh "$PROD_USER@$PROD_HOST" \
            "docker login ghcr.io --username '$GHCR_USERNAME' --password-stdin"

          # shellcheck disable=SC2029
          ssh "$PROD_USER@$PROD_HOST" \
            "cd '$PROD_PATH' && \
            IMAGE='$IMAGE_URI' APP_VERSION='$APP_VERSION' docker compose pull && \
            IMAGE='$IMAGE_URI' APP_VERSION='$APP_VERSION' docker compose up --detach --wait --remove-orphans"

      - name: Verificar producción
        env:
          PROD_URL: ${{ vars.PROD_URL }}
        run: curl --fail --retry 5 --retry-delay 3 "$PROD_URL/health"
