name: CI/CD

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ci:
    name: Integrar y validar
    runs-on: ubuntu-latest

    steps:
      - name: Descargar el código
        uses: actions/checkout@v6

      - name: Preparar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Revisar formato
        run: npm run lint

      - name: Ejecutar pruebas
        run: npm test

      - name: Construir la aplicación
        run: npm run build

      - name: Verificar la imagen Docker
        run: docker build --tag formatec-cicd:${{ github.sha }} .

      - name: Preparar GitHub Pages
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        uses: actions/configure-pages@v5

      - name: Guardar el artefacto validado
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy:
    name: Desplegar en producción
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    needs: ci
    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    concurrency:
      group: github-pages
      cancel-in-progress: false

    steps:
      - name: Publicar el artefacto
        id: deployment
        uses: actions/deploy-pages@v4

