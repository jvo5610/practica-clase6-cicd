<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta
      name="description"
      content="Checklist interactivo para aprender CI/CD con GitHub Actions."
    >
    <title>Checklist CI/CD | FormaTEC</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="shell">
      <header class="hero">
        <p class="eyebrow">FormaTEC · Módulo 3 · Clase práctica</p>
        <h1>Entrega software con confianza</h1>
        <p class="lead">
          Completa el pipeline y observa cómo cada control acerca el cambio a
          producción.
        </p>
      </header>

      <section class="progress-card" aria-labelledby="progress-title">
        <div>
          <p class="section-label" id="progress-title">Progreso del pipeline</p>
          <p class="status" id="status" aria-live="polite"></p>
        </div>
        <strong class="percentage" id="percentage">0%</strong>
        <div
          class="progress-track"
          role="progressbar"
          aria-label="Progreso"
          aria-valuemin="0"
          aria-valuemax="100"
          aria-valuenow="0"
        >
          <span id="progress-bar"></span>
        </div>
      </section>

      <section aria-labelledby="pipeline-title">
        <div class="section-heading">
          <div>
            <p class="section-label">Pipeline</p>
            <h2 id="pipeline-title">De código a entrega</h2>
          </div>
          <button class="secondary-button" id="reset-button" type="button">
            Reiniciar
          </button>
        </div>
        <div class="pipeline" id="pipeline"></div>
      </section>

      <aside class="idea-clave">
        <strong>Idea clave:</strong>
        cada etapa recibe un resultado, lo controla y habilita la siguiente.
      </aside>
    </main>

    <template id="stage-template">
      <article class="stage">
        <label>
          <input type="checkbox">
          <span class="stage-number"></span>
          <span>
            <strong class="stage-title"></strong>
            <small class="stage-description"></small>
          </span>
        </label>
      </article>
    </template>

    <script type="module" src="./app.js"></script>
  </body>
</html>
